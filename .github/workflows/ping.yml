name: Ping Hugging Face Space

on:
  schedule:
    # Runs at 00:00 UTC every day. Update this cron if you want a different ping frequency.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      space_url:
        description: "Hugging Face Space URL to ping"
        required: false
        default: "https://huggingface.co/spaces/qcsyn/rubriq-demo"

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SPACE_URL: ${{ github.event.inputs.space_url || 'https://huggingface.co/spaces/qcsyn/rubriq-demo' }}
    steps:
      - name: Ping Space URL
        run: curl -s -L "${SPACE_URL}" > /dev/null
